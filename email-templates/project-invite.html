<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project invitation</title>
  </head>
  <body style="margin:0;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#172033;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e6ebf2;">
            <tr>
              <td style="padding:32px 32px 16px;">
                <img src="https://tracker-six-gules.vercel.app/logo.png" alt="Life Tracker" width="48" height="48" style="display:block;border:0;" />
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 8px;">
                <h1 style="margin:0;font-size:28px;line-height:1.2;color:#101827;">You're invited to {{projectName}}</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 24px;">
                <p style="margin:0;font-size:16px;line-height:1.6;color:#42526b;">
                  {{inviterName}} invited you to collaborate on a shared task project in Life Tracker.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 32px;">
                <a href="{{projectUrl}}" style="display:inline-block;background:#172033;color:#ffffff;text-decoration:none;font-weight:700;font-size:15px;padding:14px 20px;border-radius:10px;">
                  Open project
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 32px;background:#f8fafc;border-top:1px solid #e6ebf2;">
                <p style="margin:0;font-size:13px;line-height:1.5;color:#697586;">
                  If you did not expect this invitation, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
